name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Format check
        run: pnpm format:check
      - name: Unit tests
        run: pnpm test
      - name: Build
        run: pnpm build

  # The e2e suite drives the real engine in mock-LLM mode, so it needs the
  # sibling repo checked out where playwright.config.ts expects it.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: openswindle-web
      - uses: actions/checkout@v4
        with:
          repository: arkanine1000/openswindle
          path: openswindle
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: openswindle-web/pnpm-lock.yaml
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Sync engine dependencies
        run: uv sync --locked
        working-directory: openswindle
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: openswindle-web
      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium
        working-directory: openswindle-web
      - name: End-to-end tests
        run: pnpm e2e
        working-directory: openswindle-web
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: openswindle-web/test-results/
          retention-days: 7
