<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <pattern id="hatch" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(38)">
      <line x1="0" y1="0" x2="0" y2="9" stroke="#151310" stroke-width="1.8" opacity="0.45"/>
    </pattern>
    <pattern id="hatchDeep" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(38)">
      <line x1="0" y1="0" x2="0" y2="6" stroke="#151310" stroke-width="1.8" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- No shadow here: the viewBox leaves only ~16px below the die, and the
       6px outline eats most of that. It lives in Die.module.css instead,
       where a CSS filter can paint outside the element's box. -->
  <path d="M 100 20
  Q 137 40 169 62
  Q 172 103 167 144
  Q 134 164 100 184
  Q 66 163 32 142
  Q 30 102 33 61
  Q 67 41 100 20 Z" fill="#4a7fb5"/>
  <path d="M 100 20 Q 67 41 33 61 L 32 142 Q 66 81 100 20 Z" fill="#6e9fce"/>
  <path d="M 100 20 Q 137 40 169 62 L 167 144 Q 134 82 100 20 Z" fill="#2f5f92"/>
  <path d="M 100 20 Q 137 40 169 62 L 167 144 Q 134 82 100 20 Z" fill="url(#hatch)"/>
  <path d="M 33 142 Q 100 145 167 144 L 100 184 Z" fill="#24507d"/>
  <path d="M 33 142 Q 100 145 167 144 L 100 184 Z" fill="url(#hatchDeep)"/>
  <path d="M 100 20 Q 134 82 167 144 Q 100 145 33 142 Q 66 81 100 20 Z" fill="#4a7fb5"/>

  <!-- A few strokes of form on the lit face, in place of a gradient. -->
  <path d="M 52 132 q 12 -22 24 -44 M 62 137 q 10 -18 20 -36" stroke="#151310" stroke-width="1.8"
        opacity="0.28" fill="none" stroke-linecap="round"/>

  <path d="M 100 20 Q 134 82 167 144 Q 100 145 33 142 Q 66 81 100 20 Z" fill="none" stroke="#151310" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M 100 20
  Q 137 40 169 62
  Q 172 103 167 144
  Q 134 164 100 184
  Q 66 163 32 142
  Q 30 102 33 61
  Q 67 41 100 20 Z" fill="none" stroke="#151310" stroke-width="6" stroke-linejoin="round"/>
  
    <circle cx="100" cy="74" r="14" fill="#f6f2e7" stroke="#151310" stroke-width="3"/>
    <path d="M 91 81 a 11 11 0 0 0 18 -1" fill="none" stroke="#151310"
          stroke-width="2" opacity="0.5" stroke-linecap="round"/>
    <circle cx="100" cy="118" r="14" fill="#f6f2e7" stroke="#151310" stroke-width="3"/>
    <path d="M 91 125 a 11 11 0 0 0 17 -1" fill="none" stroke="#151310"
          stroke-width="2" opacity="0.5" stroke-linecap="round"/>
</svg>
